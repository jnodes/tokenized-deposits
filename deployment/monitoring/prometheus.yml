# ─────────────────────────────────────────────────────────────
# Prometheus Configuration -- Cari Network Platform
# ─────────────────────────────────────────────────────────────
# Production: Azure Monitor metrics are also collected via Azure Monitor for containers
# This Prometheus config is for the local/dev monitoring stack
# ─────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # ── Cari Platform API ──────────────────────────────────────
  - job_name: cari-api
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets:
          - api:8000
        labels:
          service: cari-platform
          component: api

  # ── PostgreSQL ─────────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          service: cari-platform
          component: database

  # ── Redis ──────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: cari-platform
          component: cache

  # ── Kafka ──────────────────────────────────────────────────
  - job_name: kafka
    static_configs:
      - targets:
          - kafka-exporter:9308
        labels:
          service: cari-platform
          component: messaging

  # ── Prometheus self-monitoring ─────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
