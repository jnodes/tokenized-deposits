name: CI -- Cari Network Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  FOUNDRY_PROFILE: ci
  REGISTRY: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
  IMAGE_NAME: cari-platform

jobs:
  # ── Smart Contract Tests (Quest 1) ──────────────────────────
  contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        run: forge test -vvv
        env:
          FOUNDRY_PROFILE: ci

      - name: Run Forge coverage
        run: forge coverage --report lcov

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: contract-coverage
          path: lcov.info

  # ── Off-Chain Platform Tests (Quest 2 + Quest 3) ────────────
  offchain:
    name: Off-Chain Platform Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff mypy

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy offchain/ compliance/ security/ risk/ --ignore-missing-imports
        continue-on-error: true

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Quest 2 tests
        run: PYTHONPATH=. pytest offchain/tests/ -v --tb=short --junitxml=reports/quest2.xml

      - name: Run Quest 3 tests
        run: PYTHONPATH=. pytest tests/compliance/ -v --tb=short --junitxml=reports/quest3.xml

      - name: Run full platform tests with coverage
        run: |
          PYTHONPATH=. pytest offchain/tests/ tests/compliance/ \
            --cov=offchain --cov=compliance --cov=security --cov=risk \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing \
            -v --tb=short

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/

  # ── Security Scanning ───────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Docker Build ────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [contracts, offchain, security]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
