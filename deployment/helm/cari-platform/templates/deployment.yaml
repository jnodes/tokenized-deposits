apiVersion: apps/v1
kind: Deployment
metadata:
  name: cari-api
  labels:
    app: cari-platform
    component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: cari-platform
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cari-platform
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: CARI_ENVIRONMENT
              value: {{ .Values.environment }}
            - name: CARI_LOG_LEVEL
              value: {{ .Values.config.logLevel }}
            - name: PRIVIDIUM_RPC_URL
              value: {{ .Values.blockchain.rpcUrl }}
            - name: HSM_PROVIDER
              value: {{ .Values.hsm.provider }}
            - name: CUSTODY_PROVIDER
              value: {{ .Values.custody.provider }}
            - name: AML_PROVIDER
              value: {{ .Values.compliance.amlProvider }}
            - name: FIREBLOCKS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cari-vendor-secrets
                  key: fireblocks-api-key
                  optional: true
            - name: CHAINALYSIS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cari-vendor-secrets
                  key: chainalysis-api-key
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cari-db-credentials
                  key: url
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
