[profile.default]
src = "contracts"
test = "test"
script = "deploy"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
ffi = false
via_ir = false

# Fuzz testing config
[fuzz]
runs = 1024
max_test_rejects = 65536
seed = "0x1"

# Invariant testing config
[invariant]
runs = 256
depth = 64
fail_on_revert = false

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
